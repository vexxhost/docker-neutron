name: build

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - stable/**

permissions:
  contents: read

jobs:
  tox:
    name: tox (${{ matrix.project.repository }})
    uses: vexxhost/docker-atmosphere/.github/workflows/tox.yml@2244615e3b5ef56a6e83e993ede50ea9c3716cd7 # main
    strategy:
      fail-fast: false
      matrix:
        project:
          - repository: openstack/neutron
            ref: 9925d26bc22397cb1e6e87d7417b7f753ca2245a # master
          - repository: openstack/neutron-dynamic-routing
            ref: 5f608f7d3d43396cb956241e4ae2d5759bfb126d # master
          - repository: openstack/neutron-vpnaas
            ref: 574bed1358e668364e3a69a91f249fd65cb11911 # master
          - repository: openstack/networking-baremetal
            ref: f327f9118240efd606890bce1dc6e9690749b860 # master
          - repository: openstack/networking-generic-switch
            ref: 053d1243535efc985766b7bdcbabe4954380190f # master
          - repository: openstack/tap-as-a-service
            ref: f7b99350c74a2a561ea366127c490d5a40b6e93d # master
    with:
      repository: ${{ matrix.project.repository }}
      ref: ${{ matrix.project.ref }}

  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@ee412cafe33e0d7d8b3bc7d0ca64c9f155e293c7 # main
        with:
          repository: openstack/neutron
          ref: 9925d26bc22397cb1e6e87d7417b7f753ca2245a # master

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@ee412cafe33e0d7d8b3bc7d0ca64c9f155e293c7 # main
        with:
          repository: openstack/neutron-dynamic-routing
          ref: 5f608f7d3d43396cb956241e4ae2d5759bfb126d # master

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@ee412cafe33e0d7d8b3bc7d0ca64c9f155e293c7 # main
        with:
          repository: openstack/neutron-vpnaas
          ref: 574bed1358e668364e3a69a91f249fd65cb11911 # master

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@ee412cafe33e0d7d8b3bc7d0ca64c9f155e293c7 # main
        with:
          repository: openstack/networking-baremetal
          ref: f327f9118240efd606890bce1dc6e9690749b860 # master

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@ee412cafe33e0d7d8b3bc7d0ca64c9f155e293c7 # main
        with:
          repository: openstack/networking-generic-switch
          ref: 053d1243535efc985766b7bdcbabe4954380190f # master

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@ee412cafe33e0d7d8b3bc7d0ca64c9f155e293c7 # main
        with:
          repository: vexxhost/neutron-policy-server
          ref: a215317bfa147f29dd4e85ff96a54982384c8ba1 # main

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@ee412cafe33e0d7d8b3bc7d0ca64c9f155e293c7 # main
        with:
          repository: vexxhost/neutron-ovn-network-logging-parser
          ref: 392a445022a87fb460f113bd5e3315760da105e7 # main

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@ee412cafe33e0d7d8b3bc7d0ca64c9f155e293c7 # main
        with:
          repository: openstack/tap-as-a-service
          ref: f7b99350c74a2a561ea366127c490d5a40b6e93d # master

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@ee412cafe33e0d7d8b3bc7d0ca64c9f155e293c7 # main
        with:
          repository: vexxhost/atmosphere
          ref: main
          path: vexxhost/atmosphere

      - uses: vexxhost/docker-atmosphere/.github/actions/build-image@ee412cafe33e0d7d8b3bc7d0ca64c9f155e293c7 # main
        with:
          image-name: neutron
          build-contexts: |
            neutron=openstack/neutron
            neutron-dynamic-routing=openstack/neutron-dynamic-routing
            neutron-vpnaas=openstack/neutron-vpnaas
            networking-baremetal=openstack/networking-baremetal
            networking-generic-switch=openstack/networking-generic-switch
            neutron-policy-server=vexxhost/neutron-policy-server
            neutron-ovn-network-logging-parser=vexxhost/neutron-ovn-network-logging-parser
            tap-as-a-service=openstack/tap-as-a-service
            ovsinit-src=vexxhost/atmosphere/crates/ovsinit
          push: ${{ github.event_name != 'pull_request' }}
